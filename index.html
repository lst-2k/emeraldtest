<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Member Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
        .leaderboard-container { max-width: 1450px; margin: 0 auto; background-color: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        .header { background: #124d12; padding: 0; text-align: center; border-bottom: 4px solid #FFD700; height: 220px; display: flex; align-items: center; justify-content: center; }
        .header img { width: 100%; height: 100%; object-fit: contain; }
        
        .venue-bar { background: #444; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 16px; border-bottom: 1px solid #000; }

        .table-responsive { width: 100%; overflow-x: auto; border-bottom: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #e6e6e6; padding: 10px 12px; font-size: 11px; border-bottom: 2px solid #ddd; text-transform: uppercase; color: #444; }
        td { padding: 8px 12px; border-bottom: 1px solid #ddd; font-size: 13px; white-space: nowrap; }
        
        /* To Par Colors */
        .to-par { font-weight: bold; text-align: center; font-size: 15px; }
        .to-par.under { color: #8B0000; } 
        .to-par.even   { color: #1AA260; }
        .to-par.over   { color: #000000; }

        .middle-logo-divider { text-align: center; padding: 30px 20px; background-color: #fff; display: flex; justify-content: center; }
        .middle-logo-divider img { max-width: 100%; max-height: 150px; width: auto; object-fit: contain; }

        .col-pos { width: 45px; text-align: center; font-weight: bold; color: #228B22; }
        .col-stat { width: 70px; text-align: center; }
        .col-money { width: 110px; text-align: center; font-weight: bold; }
        .col-bonus { width: 75px; text-align: center; background-color: #fcfcfc; color: #666; font-size: 12px; border-left: 1px solid #eee; }
        
        .section-title { background: #228B22; color: white; padding: 10px 15px; font-size: 16px; font-weight: bold; border-left: 8px solid #FFD700; }
        .player-name { font-weight: bold; }
        .standings-right { text-align: right; padding-right: 25px; }
        .hidden { display: none; }
        
        /* Cutoff logic */
        .top-tier { background: linear-gradient(to right, #eef7ee, #ffffff) !important; }
        .cutoff-row td { border-bottom: 4px solid #228B22 !important; }

        /* Container adjustments for mobile spacing */
		.hof-cards {
			display: flex;
			justify-content: center;
			gap: 20px;
			flex-wrap: wrap;
			padding: 30px 10px;
			perspective: 1000px;
		}

		.hof-card {
			background: linear-gradient(135deg, #2a2a2a 0%, #1a1a1a 100%);
			border: 1px solid rgba(255, 215, 0, 0.4);
			border-radius: 12px;
			padding: 20px 15px;
			width: 160px; /* Slimmer for mobile side-by-side display */
			text-align: center;
			position: relative;
			
			/* THE 3D EFFECT: Default Tilt and Lift */
			transform: rotateX(10deg) rotateY(-5deg); 
			box-shadow: 
				5px 5px 0px rgba(0, 0, 0, 0.2),   /* Side thickness */
				10px 15px 25px rgba(0, 0, 0, 0.5); /* Ground shadow */
			
			transition: transform 0.3s ease;
		}

		/* Add a "shine" layer to the top of the card */
		.hof-card::after {
			content: "";
			position: absolute;
			top: 0; left: 0; right: 0; bottom: 0;
			border-radius: 12px;
			background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, rgba(255,255,255,0) 50%);
			pointer-events: none;
		}

		/* Specific styling for the Gold winner to stand out more */
		.hof-card:nth-child(1) {
			border: 2px solid #FFD700;
			transform: rotateX(10deg) rotateY(-5deg) scale(1.05);
			z-index: 2; /* Keeps it on top of other cards */
		}

		/* For mobile: if they DO tap it, it "depresses" like a button */
		.hof-card:active {
			transform: rotateX(0deg) rotateY(0deg) scale(0.98);
			box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
		}

		.hof-medal {
			font-size: 36px;
			margin-bottom: 5px;
			/* Makes the emoji look 3D */
			filter: drop-shadow(3px 3px 2px rgba(0,0,0,0.5));
		}
    </style>
</head>
<body>

<div class="leaderboard-container">
    <div class="header"><img src="logo.png" alt="Logo"></div>
    <div id="venue-display" class="venue-bar">Tournament Loading...</div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="col-pos">POS</th>
                    <th style="text-align:left">PLAYER</th>
                    <th class="col-stat">TO PAR</th>
                    <th class="col-stat">R1</th>
                    <th class="col-stat">R2</th>
                    <th id="th-r3" class="col-stat hidden">R3</th>
                    <th id="th-r4" class="col-stat hidden">R4</th>
                    <th class="col-stat">TOT</th>
                    <th class="col-money">PRIZE</th>
                    <th class="col-bonus">FiR%</th>
                    <th class="col-bonus">GiR%</th>
                    <th class="col-bonus">SCRAM</th>
                    <th class="col-bonus">NTP</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div class="middle-logo-divider"><img src="2k25 logo.png"></div>
    <div class="section-title">Season Standings</div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="col-pos">POS</th>
                    <th style="text-align:left">PLAYER</th>
                    <th class="standings-right">POINTS</th>
                    <th class="standings-right">EARNINGS</th>
                    <th class="standings-right">EVENTS</th>
                </tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>

    <div class="hof-container">
        <div class="hof-header">🏆 Hall of Fame 🏆</div>
        <div id="hof-display" class="hof-cards"></div>
    </div>
</div>

<script>
    const DATA_URL = 'data.json'; 

    async function loadTourData() {
        try {
            const response = await fetch(DATA_URL);
            const data = await response.json();
            renderAll(data);
        } catch (err) { console.error("Error loading data:", err); }
    }

    function calculateToParValue(p, par) {
        let total = 0, played = 0;
        [p.r1, p.r2, p.r3, p.r4].forEach(r => {
            let val = parseInt(r);
            if (!isNaN(val) && val > 0) { total += val; played++; }
        });
        return played > 0 ? total - (par * played) : null;
    }

    function getToParClass(score) {
        if (score === null) return '';
        if (score < 0) return 'under';
        if (score === 0) return 'even';
        return 'over';
    }

    function formatToPar(score) {
        if (score === null) return '-';
        if (score === 0) return 'E';
        return (score > 0 ? '+' : '') + score;
    }

    function calculateTotal(p) {
        let s = [p.r1, p.r2, p.r3, p.r4].filter(v => v && v > 0);
        return s.length > 0 ? s.reduce((a, b) => parseInt(a) + parseInt(b), 0) : 999;
    }

    function getConsoleColor(console) {
        if (console === 'fa-playstation') return '#003791';
        if (console === 'fa-xbox') return '#107C10';
        return '#555';
    }

    function renderAll(tourData) {
        document.getElementById('venue-display').textContent = tourData.venue;
        const par = parseInt(tourData.coursePar) || 72;

        const hasR3 = tourData.players.some(p => p.r3 > 0);
        const hasR4 = tourData.players.some(p => p.r4 > 0);
        const showExtended = tourData.showR3R4 || hasR3 || hasR4;

        if (showExtended) {
            document.getElementById('th-r3').classList.remove('hidden');
            document.getElementById('th-r4').classList.remove('hidden');
        }

        // 1. LEADERBOARD
        const lbBody = document.getElementById('leaderboard-body');
        lbBody.innerHTML = '';
        const sortedLB = [...tourData.players].sort((a,b) => calculateTotal(a) - calculateTotal(b));
        
        sortedLB.forEach((p, idx) => {
            const toParVal = calculateToParValue(p, par);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-pos">${idx + 1}</td>
                <td class="player-name">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="fa-brands ${p.console || 'fa-gamepad'}" style="color:${getConsoleColor(p.console)}"></i>
                        <span class="fi fi-${(p.country || 'un').toLowerCase()}"></span>
                        ${p.name}
                    </div>
                </td>
                <td class="to-par ${getToParClass(toParVal)}">${formatToPar(toParVal)}</td>
                <td class="col-stat">${p.r1 || '-'}</td>
                <td class="col-stat">${p.r2 || '-'}</td>
                <td class="col-stat ${showExtended ? '' : 'hidden'}">${p.r3 || '-'}</td>
                <td class="col-stat ${showExtended ? '' : 'hidden'}">${p.r4 || '-'}</td>
                <td class="col-stat"><strong>${calculateTotal(p) === 999 ? '-' : calculateTotal(p)}</strong></td>
                <td class="col-money">${p.prize || '$0'}</td>
                <td class="col-bonus">${p.fir || '-'}</td>
                <td class="col-bonus">${p.gir || '-'}</td>
                <td class="col-bonus">${p.scrambling || '-'}</td>
                <td class="col-bonus">${p.ntp || '-'}</td>
            `;
            lbBody.appendChild(tr);
        });

        // 2. SEASON STANDINGS
        const stBody = document.getElementById('standings-body');
        stBody.innerHTML = '';
        
        // Map data from the separate JSON objects
        const standings = Object.keys(tourData.seasonPoints || {}).map(name => {
            const pInfo = tourData.players.find(pl => pl.name === name) || {};
            return {
                name,
                points: tourData.seasonPoints[name] || 0,
                earnings: tourData.seasonEarnings[name] || 0,
                events: tourData.seasonEvents[name] || 0,
                console: pInfo.console || 'fa-gamepad',
                country: pInfo.country || 'un'
            };
        }).sort((a, b) => b.points - a.points);

        const cutoffIdx = Math.ceil(standings.length / 2) - 1;

        standings.forEach((p, idx) => {
            const tr = document.createElement('tr');
            if (idx <= cutoffIdx) tr.classList.add('top-tier');
            if (idx === cutoffIdx) tr.classList.add('cutoff-row');
            
            tr.innerHTML = `
                <td class="col-pos">${idx + 1}</td>
                <td class="player-name">
                    <div style="display:flex; align-items:center; gap:8px;">
                        <i class="fa-brands ${p.console}" style="color:${getConsoleColor(p.console)}"></i>
                        <span class="fi fi-${p.country.toLowerCase()}"></span>
                        ${p.name}
                    </div>
                </td>
                <td class="standings-right">${p.points.toLocaleString()}</td>
                <td class="standings-right" style="font-weight:bold;">$${p.earnings.toLocaleString()}</td>
                <td class="standings-right">${p.events}</td>
            `;
            stBody.appendChild(tr);
        });

        // 3. HALL OF FAME
        const hofDisplay = document.getElementById('hof-display');
        hofDisplay.innerHTML = '';
        const sortedHOF = [...standings].sort((a,b) => b.earnings - a.earnings).slice(0,3);
        const medals = ['🥇', '🥈', '🥉'];
        
        sortedHOF.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'hof-card';
            card.innerHTML = `
                <div style="font-size:24px;">${medals[i]}</div>
                <div style="font-size:14px; font-weight:bold; margin:5px 0;">${p.name}</div>
                <div style="font-size:12px; color:#FFD700">$${p.earnings.toLocaleString()}</div>
            `;
            hofDisplay.appendChild(card);
        });
    }

    window.onload = loadTourData;
</script>
</body>
</html>

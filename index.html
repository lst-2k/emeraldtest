<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour Leaderboard</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: #f4f4f4; }

        /* --- STICKY BRANDING SECTION --- */
        .sticky-top-wrap {
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .main-header { 
            background-color: #1b5e20; 
            color: white; 
            text-align: center; 
            padding: 15px; 
            font-weight: bold; 
            font-size: 24px; 
            border-bottom: 4px solid #fbc02d; 
            text-transform: uppercase; 
        }
        .info-bar { 
            background-color: #333; 
            color: #ffeb3b; 
            padding: 10px 20px; 
            display: flex; 
            justify-content: center; 
            gap: 40px; 
            align-items: center; 
            font-size: 14px; 
            font-weight: bold; 
        }
        .venue-section { 
            text-align: center; 
            padding: 15px 0; 
            background: white; 
            border-bottom: 1px solid #ddd; 
        }
        .venue-section h2 { color: #1b5e20; margin: 0; font-size: 24px; text-transform: uppercase; }
        .venue-section p { font-weight: bold; margin: 5px 0 0 0; font-size: 16px; color: #333; }

        /* --- CONTENT AREA --- */
        .content-padding { padding: 20px; }
        .section-title { text-align:center; color:#1b5e20; text-transform: uppercase; margin-top: 30px; margin-bottom: 15px; }

        /* --- TABLES --- */
        .table-container { 
            width: 100%; 
            overflow-x: auto; 
            background-color: white; 
            border: 1px solid #ddd;
            margin-bottom: 20px;
            border-radius: 4px;
        }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background-color: #1b5e20; color: white; padding: 12px; text-transform: uppercase; font-size: 11px; border-bottom: 2px solid #fbc02d; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        
        /* HIGHLIGHT COLUMNS */
        .net-cell { background-color: #f1f8e9; font-weight: bold; color: #1b5e20; }
        .hcap-cell { background-color: #fffde7; font-style: italic; }

        /* ICONS */
        .platform-icon { width: 20px; height: 20px; vertical-align: middle; margin-right: 8px; object-fit: contain; }
    </style>
</head>
<body>

    <div class="sticky-top-wrap">
        <div class="main-header">EMERALD TOUR LEADERBOARD</div>
        <div class="info-bar">
            <div>DATE: <span id="event-date" style="color: white;">--</span></div>
            <div>COURSE PAR: <span id="course-par" style="color: white;">--</span></div>
        </div>
        <div class="venue-section">
            <h2 id="current-venue">Loading Leaderboard...</h2>
            <p id="total-prize-pool">Total Prize Pool: --</p>
        </div>
    </div>

    <div class="content-padding">
        
        <h3 class="section-title">Tournament Leaderboard</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>POS</th>
                        <th style="text-align:left;">PLAYER</th>
                        <th>HCP</th>
                        <th>R1</th>
                        <th>R2</th>
                        <th>R3</th>
                        <th>R4</th>
                        <th>GROSS</th>
                        <th>NET</th>
                        <th>TO PAR</th>
                        <th>PRIZES</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <h3 class="section-title">Season Stats & Standings</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr><th>Rank</th><th style="text-align:left;">Player</th><th>Points</th><th>Earnings</th><th>Events</th><th>FIR %</th><th>GIR %</th><th>Scram</th><th>NTP</th></tr>
                </thead>
                <tbody id="stats-body"></tbody>
            </table>
        </div>
    </div>

    <script>
const DATA_URL = 'data.json';

const platformIcons = {
    'fa-playstation': 'https://upload.wikimedia.org/wikipedia/commons/0/00/PlayStation_logo.svg',
    'fa-xbox': 'https://upload.wikimedia.org/wikipedia/commons/f/f9/Xbox_one_logo.svg',
    'fa-steam': 'https://upload.wikimedia.org/wikipedia/commons/8/83/Steam_icon_logo.svg'
};

async function loadData() {
    try {
        const response = await fetch(DATA_URL + '?t=' + Date.now());
        if (!response.ok) throw new Error("File not found");
        const data = await response.json();
        renderData(data);
    } catch (err) { 
        console.error("Load Error:", err);
        document.getElementById('current-venue').innerText = "Data Error: Make sure data.json exists.";
    }
}

function renderData(data) {
    const parVal = parseInt(data.coursePar) || 72;
    document.getElementById('current-venue').innerText = data.venue || "Tournament";
    document.getElementById('course-par').innerText = parVal;
    document.getElementById('event-date').innerText = data.date || "--";
    document.getElementById('total-prize-pool').innerText = `Total Prize Pool: ${data.prizePool || '--'}`;

    const lbBody = document.getElementById('leaderboard-body');
    lbBody.innerHTML = "";

    if (data.players && Array.isArray(data.players)) {
        let players = data.players.map(p => {
            const hcap = parseInt(p.hcap) || 0;
            const rounds = [p.r1, p.r2, p.r3, p.r4].map(r => parseInt(r) || 0);
            const activeCount = rounds.filter(r => r > 0).length;
            
            const gross = rounds.reduce((a, b) => a + b, 0);
            const net = activeCount > 0 ? (gross - hcap) : 0;
            
            let toParValue = 999;
            let toParDisplay = "--";
            
            if (activeCount > 0) {
                toParValue = net - (parVal * activeCount);
                toParDisplay = toParValue > 0 ? `+${toParValue}` : (toParValue === 0 ? "E" : toParValue);
            }

            const iconUrl = platformIcons[p.console] || "";
            const iconHtml = iconUrl ? `<img src="${iconUrl}" class="platform-icon">` : "";
            
            return { ...p, hcap, rounds, gross, net, toParDisplay, toParValue, iconHtml, activeCount };
        });

        // SORT BY NET TO PAR
        players.sort((a, b) => a.toParValue - b.toParValue);

        players.forEach((p, i) => {
            lbBody.innerHTML += `
                <tr>
                    <td>${p.activeCount > 0 ? (i + 1) : '-'}</td>
                    <td style="text-align:left; font-weight:bold;">${p.iconHtml}${p.name}</td>
                    <td class="hcap-cell">${p.hcap}</td>
                    <td>${p.rounds[0]||'-'}</td>
                    <td>${p.rounds[1]||'-'}</td>
                    <td>${p.rounds[2]||'-'}</td>
                    <td>${p.rounds[3]||'-'}</td>
                    <td>${p.activeCount > 0 ? p.gross : '-'}</td>
                    <td class="net-cell">${p.activeCount > 0 ? p.net : '-'}</td>
                    <td style="font-weight:bold; color:${p.toParValue <= 0 ? 'red' : 'black'}">${p.toParDisplay}</td>
                    <td style="color:#1b5e20; font-weight:bold;">${p.prize || '--'}</td>
                </tr>`;
        });
    }

    // SEASON STATS
    const statsBody = document.getElementById('stats-body');
    statsBody.innerHTML = "";
    if (data.seasonPoints && data.seasonEarnings) {
        const playerNames = Object.keys(data.seasonPoints).sort((a,b) => data.seasonPoints[b] - data.seasonPoints[a]);

        playerNames.forEach((name, i) => {
            const sPoints = data.seasonPoints[name] || 0;
            const sEarn = data.seasonEarnings[name] || 0;
            const sEvents = data.seasonEvents ? (data.seasonEvents[name] || 0) : 0;
            
            // Find player object for bonus stats
            const pObj = data.players.find(p => p.name === name) || {};

            statsBody.innerHTML += `
                <tr>
                    <td>${i + 1}</td>
                    <td style="text-align:left; font-weight:bold;">${name}</td>
                    <td><b>${sPoints.toLocaleString()}</b></td>
                    <td style="color:#1b5e20; font-weight:bold;">$${sEarn.toLocaleString()}</td>
                    <td>${sEvents}</td>
                    <td>${pObj.fir || '--'}%</td>
                    <td>${pObj.gir || '--'}%</td>
                    <td>${pObj.scrambling || '--'}%</td>
                    <td>${pObj.ntp ? pObj.ntp + 'ft' : '--'}</td>
                </tr>`;
        });
    }
}

loadData();
    </script>
</body>
</html>

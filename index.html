<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Member Standings</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --emerald: #228B22; --dark-emerald: #124d12; --gold: #FFD700; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f4f4; margin: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        /* Header */
        .header { background: linear-gradient(135deg, var(--dark-emerald), var(--emerald)); color: white; padding: 30px; text-align: center; }
        .header h1 { margin: 0; font-size: 2.5em; text-transform: uppercase; letter-spacing: 2px; }
        .event-info { display: flex; justify-content: space-around; background: #0e3a0e; padding: 10px; font-weight: bold; font-size: 0.9em; }

        /* Tables */
        h2 { background: #eee; margin: 0; padding: 15px; border-bottom: 2px solid var(--emerald); color: #333; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 30px; }
        th { background: #f8f8f8; color: #666; font-size: 0.85em; text-transform: uppercase; padding: 12px; text-align: left; border-bottom: 2px solid #ddd; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        
        .pos { font-weight: bold; width: 50px; text-align: center; }
        .player-cell { display: flex; align-items: center; gap: 10px; }
        .to-par { font-weight: bold; width: 60px; }
        .under { color: #d9534f; } /* Red for under par */
        .over { color: #333; }
        .total { font-weight: bold; background: #f9f9f9; width: 70px; text-align: center; }
        .prize { color: var(--emerald); font-weight: bold; text-align: right; }

        /* Status Colors */
        tr:nth-child(even) { background-color: #fafafa; }
        tr:hover { background-color: #f1f8f1; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1 id="main-title">EMERALD TOUR</h1>
        <div class="event-info">
            <span id="display-venue">---</span>
            <span id="display-date">---</span>
            <span>PAR: <span id="display-par">--</span></span>
            <span>PURSE: <span id="display-purse">--</span></span>
        </div>
    </div>

    <h2>Current Event Leaderboard</h2>
    <table>
        <thead>
            <tr>
                <th>Pos</th>
                <th>Player</th>
                <th>To Par</th>
                <th>R1</th>
                <th>R2</th>
                <th class="r34 hidden">R3</th>
                <th class="r34 hidden">R4</th>
                <th>Total</th>
                <th style="text-align:right">Prize</th>
            </tr>
        </thead>
        <tbody id="leaderboard-body">
            </tbody>
    </table>

    <h2>Season Standings & Stats</h2>
    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>Season Pts</th>
                <th>Earnings</th>
                <th>Events</th>
                <th>FiR %</th>
                <th>GiR %</th>
                <th>Scram</th>
                <th>NTP</th>
            </tr>
        </thead>
        <tbody id="standings-body">
            </tbody>
    </table>
</div>

<script>
    // Name of your exported file (Must be in the same folder on GitHub)
    const DATA_FILE = 'emerald_tour_full_backup.json';

    async function loadResults() {
        try {
            const response = await fetch(DATA_FILE);
            if (!response.ok) throw new Error("JSON file not found.");
            const data = await response.json();

            // Update Header
            document.getElementById('main-title').textContent = data.header || "EMERALD TOUR";
            document.getElementById('display-venue').textContent = data.venue || "---";
            document.getElementById('display-date').textContent = data.date || "---";
            document.getElementById('display-par').textContent = data.coursePar || "--";
            document.getElementById('display-purse').textContent = data.prizePool || "--";

            const lbBody = document.getElementById('leaderboard-body');
            const stBody = document.getElementById('standings-body');

            // Determine if R3/R4 are used
            const hasR3 = data.players.some(p => p.r3 && p.r3 > 0);
            if(hasR3) document.querySelectorAll('.r34').forEach(el => el.classList.remove('hidden'));

            // Render Leaderboard
            data.players.forEach((p, index) => {
                const par = parseInt(data.coursePar) || 72;
                let total = 0, rounds = 0;
                [p.r1, p.r2, p.r3, p.r4].forEach(r => { if(r > 0) { total += parseInt(r); rounds++; } });
                const toPar = rounds > 0 ? total - (par * rounds) : 0;
                const toParText = toPar === 0 ? 'E' : (toPar > 0 ? `+${toPar}` : toPar);

                const row = `
                    <tr>
                        <td class="pos">${index + 1}</td>
                        <td>
                            <div class="player-cell">
                                <i class="fa-brands ${p.console || 'fa-gamepad'}"></i>
                                <span class="fi fi-${p.country || 'un'}"></span>
                                <span>${p.name}</span>
                            </div>
                        </td>
                        <td class="to-par ${toPar < 0 ? 'under' : ''}">${toParText}</td>
                        <td>${p.r1 || '-'}</td>
                        <td>${p.r2 || '-'}</td>
                        <td class="r34 ${hasR3 ? '' : 'hidden'}">${p.r3 || '-'}</td>
                        <td class="r34 ${hasR3 ? '' : 'hidden'}">${p.r4 || '-'}</td>
                        <td class="total">${total || '-'}</td>
                        <td class="prize">${p.prize || '$0'}</td>
                    </tr>
                `;
                lbBody.innerHTML += row;
            });

            // Render Season Standings
            // Sort by Points descending
            const sortedPlayers = Object.keys(data.seasonPoints || {}).sort((a,b) => data.seasonPoints[b] - data.seasonPoints[a]);

            sortedPlayers.forEach(name => {
                const bonus = data.seasonBonusStats ? data.seasonBonusStats[name] : null;
                const row = `
                    <tr>
                        <td style="font-weight:bold">${name}</td>
                        <td>${(data.seasonPoints[name] || 0).toLocaleString()}</td>
                        <td style="color:var(--emerald)">$ ${(data.seasonEarnings[name] || 0).toLocaleString()}</td>
                        <td>${data.seasonEvents[name] || 0}</td>
                        <td>${bonus?.fir || '-'}</td>
                        <td>${bonus?.gir || '-'}</td>
                        <td>${bonus?.scrambling || '-'}</td>
                        <td>${bonus?.ntp || '-'}</td>
                    </tr>
                `;
                stBody.innerHTML += row;
            });

        } catch (err) {
            document.body.innerHTML = `<div style="text-align:center; padding:50px;">
                <h2>Results not yet posted.</h2>
                <p>Please check back later.</p>
            </div>`;
            console.error(err);
        }
    }

    window.onload = loadResults;
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour | Pro Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --emerald: #1b5e20; --gold: #fbc02d; --dark: #333; --light-bg: #f4f4f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; background-color: var(--light-bg); }
        .header-wrap { width: 100%; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .logo-container { background-color: var(--emerald); text-align: center; padding: 10px 0; border-bottom: 4px solid var(--gold); cursor: pointer; }
        .logo-container img { max-width: 280px; height: auto; display: block; margin: 0 auto; }
        .venue-section { text-align: center; padding: 15px; background: white; }
        .venue-section h2 { color: var(--emerald); margin: 0; text-transform: uppercase; font-size: 24px; }
        .info-bar-below { background-color: var(--dark); color: #ffeb3b; padding: 8px; display: flex; justify-content: center; gap: 30px; font-size: 13px; font-weight: bold; }
        .content-padding { padding: 10px; max-width: 1400px; margin: 0 auto; }
        .submit-section, .admin-section { background: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 2px solid var(--emerald); }
        .admin-section { background: #333; color: white; border-color: var(--gold); display: none; }
        .submit-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); gap: 8px; margin-top: 10px; }
        input, select { padding: 8px; border: 1px solid #ccc; border-radius: 4px; width: 100%; font-size: 13px; }
        label { display: block; font-size: 10px; font-weight: bold; margin-bottom: 3px; color: #666; text-transform: uppercase; }
        .btn { padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-primary { background: var(--emerald); color: white; }
        .btn-admin { background: var(--gold); color: #333; }
        .btn-danger { background: #c62828; color: white; }
        .table-container { width: 100%; overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; min-width: 1150px; }
        th { background-color: var(--emerald); color: white; padding: 10px 5px; font-size: 10px; }
        td { padding: 10px 5px; border-bottom: 1px solid #eee; text-align: center; font-size: 14px; }
        .player-cell { text-align: left !important; font-weight: bold; min-width: 150px; }
        .net-cell { background-color: #f1f8e9; font-weight: bold; color: var(--emerald); }
        .bonus-text { font-size: 11px; color: #1b5e20; font-weight: bold; }
        .history-item { background: white; border: 1px solid var(--emerald); margin-bottom: 8px; border-radius: 4px; }
        .history-header { display: flex; padding: 12px; cursor: pointer; background: var(--emerald); color: white; font-weight: bold; }
        .history-content { display: none; padding: 10px; overflow-x: auto; }
        .history-item.active .history-content { display: block; }
    </style>
</head>
<body>

    <div class="header-wrap">
        <div class="logo-container" id="admin-trigger"><img src="logo.png" alt="Logo"></div>
        <div class="venue-section">
            <h2 id="current-venue">Loading Tour...</h2>
            <p id="total-prize-pool" style="font-weight:bold">Prize Pool: --</p>
        </div>
        <div class="info-bar-below">
            <div>DATE: <span id="event-date">--</span></div>
            <div>PAR: <span id="course-par">--</span></div>
        </div>
    </div>

    <div class="content-padding">
        <div id="admin-panel" class="admin-section">
            <h3 style="color:var(--gold)">Tournament Director</h3>
            <div class="submit-grid">
                <div><label>Venue</label><input type="text" id="admin-venue"></div>
                <div><label>Par</label><input type="number" id="admin-par"></div>
                <div><label>Date</label><input type="text" id="admin-date"></div>
                <div><label>Main Pool $</label><input type="number" id="admin-pool"></div>
            </div>
            <button id="saveSettingsBtn" class="btn btn-admin">SAVE SETTINGS</button>
            <div style="display:flex; gap:10px">
                <button id="archiveEventBtn" class="btn" style="background:#0277bd; color:white">ARCHIVE & UPDATE CAREER TOTALS</button>
                <button id="clearBoardBtn" class="btn btn-danger">WIPE BOARD</button>
            </div>
        </div>

        <div class="submit-section">
            <h3 style="color:var(--emerald); margin-top:0">⛳ Submit Card</h3>
            <div style="display:grid; grid-template-columns: 2fr 1fr 1fr; gap:10px">
                <div><label>Name</label><input type="text" id="form-name"></div>
                <div><label>4-Digit PIN</label><input type="password" id="form-pin" maxlength="4"></div>
                <div><label>Console</label><select id="form-platform">
                    <option value="fa-playstation">PS5</option>
                    <option value="fa-xbox">Xbox</option>
                    <option value="fa-steam">PC</option>
                </select></div>
            </div>
            <div class="submit-grid">
                <div><label>HCP</label><input type="number" id="form-hcap" value="0"></div>
                <div><label>R1</label><input type="number" id="form-r1"></div>
                <div><label>R2</label><input type="number" id="form-r2"></div>
                <div><label>R3</label><input type="number" id="form-r3"></div>
                <div><label>R4</label><input type="number" id="form-r4"></div>
                <div><label>FIR (1/0)</label><input type="number" id="form-fir" placeholder="1=Yes"></div>
                <div><label>GIR (1/0)</label><input type="number" id="form-gir" placeholder="1=Yes"></div>
                <div><label>SCR (1/0)</label><input type="number" id="form-scram" placeholder="1=Yes"></div>
                <div><label>NTPs</label><input type="number" id="form-ntp" placeholder="Qty"></div>
            </div>
            <button class="btn btn-primary" id="submitScoreBtn">UPDATE LEADERBOARD</button>
        </div>

        <h3 style="text-align:center; color:var(--emerald)">LIVE LEADERBOARD</h3>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>POS</th><th style="text-align:left">PLAYER</th><th>HCP</th>
                        <th>R1</th><th>R2</th><th>R3</th><th>R4</th>
                        <th>GROSS</th><th>NET</th><th>TP</th>
                        <th>FIR</th><th>GIR</th><th>SCR</th><th>NTP</th><th>PTS</th><th>TOTAL $</th>
                    </tr>
                </thead>
                <tbody id="leaderboard-body"></tbody>
            </table>
        </div>

        <h3 style="text-align:center; color:var(--emerald)">SEASON STANDINGS</h3>
        <div class="table-container">
            <table style="min-width:600px">
                <thead><tr><th>RK</th><th style="text-align:left">PLAYER</th><th>EV</th><th>PTS</th><th style="text-align:right">CAREER EARNINGS</th></tr></thead>
                <tbody id="season-body"></tbody>
            </table>
        </div>

        <h3 style="text-align:center; color:var(--emerald)">EVENT HISTORY</h3>
        <div id="history-container"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, orderBy, addDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

		const firebaseConfig = {
          apiKey: "AIzaSyDXQU4I1XvkNi-XE4f5q7dixo3BrVkfuC8",
		  authDomain: "emeraldtour2-f556d.firebaseapp.com",
		  projectId: "emeraldtour2-f556d",
		  storageBucket: "emeraldtour2-f556d.firebasestorage.app",
		  messagingSenderId: "148269100724",
		  appId: "1:148269100724:web:32410ea4096b26fec5f1e1",
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const scoresCol = collection(db, "live_tournament");
        const settingsDoc = doc(db, "settings", "current_event");

        const payoutTable = [0.18, 0.108, 0.068, 0.048, 0.04, 0.036, 0.0335, 0.031, 0.029, 0.027, 0.025, 0.023, 0.021, 0.019, 0.018, 0.017, 0.016, 0.015, 0.014, 0.013];
        const ptsTable = [500, 300, 190, 135, 110, 100, 95, 90, 85, 80, 75, 70, 65, 60, 57, 54, 51, 48, 45, 42];

        // Admin Auth
        let clicks = 0;
        document.getElementById('admin-trigger').onclick = () => { if(++clicks === 5) { if(prompt("Pass:") === "emerald2024") document.getElementById('admin-panel').style.display='block'; clicks=0; }};

        // Submit Score
        document.getElementById('submitScoreBtn').onclick = async () => {
            const name = document.getElementById('form-name').value.trim();
            const pin = document.getElementById('form-pin').value.trim();
            if(!name || pin.length < 4) return alert("Enter Name & 4-Digit PIN");
            const id = name.toLowerCase().replace(/\s+/g, '-');
            const ref = doc(db, "live_tournament", id);
            const snap = await getDoc(ref);
            if(snap.exists() && snap.data().pin !== pin) return alert("Wrong PIN");

            await setDoc(ref, {
                name, pin, console: document.getElementById('form-platform').value,
                hcap: parseInt(document.getElementById('form-hcap').value)||0,
                r1: parseInt(document.getElementById('form-r1').value)||0,
                r2: parseInt(document.getElementById('form-r2').value)||0,
                r3: parseInt(document.getElementById('form-r3').value)||0,
                r4: parseInt(document.getElementById('form-r4').value)||0,
                fir: parseInt(document.getElementById('form-fir').value)||0,
                gir: parseInt(document.getElementById('form-gir').value)||0,
                scram: parseInt(document.getElementById('form-scram').value)||0,
                ntp: parseInt(document.getElementById('form-ntp').value)||0
            }, { merge: true });
            alert("Scorecard Saved!");
        };

        // Admin Save
        document.getElementById('saveSettingsBtn').onclick = async () => {
            await setDoc(settingsDoc, {
                venue: document.getElementById('admin-venue').value,
                par: document.getElementById('admin-par').value,
                date: document.getElementById('admin-date').value,
                pool: document.getElementById('admin-pool').value
            });
            alert("Settings Updated");
        };

        // Real-time Sync
        onSnapshot(scoresCol, async (snapshot) => {
            const sSnap = await getDoc(settingsDoc);
            const s = sSnap.exists() ? sSnap.data() : {venue:"TBD", par:72, pool:0};
            document.getElementById('current-venue').innerText = s.venue;
            document.getElementById('course-par').innerText = s.par;
            document.getElementById('event-date').innerText = s.date || "--";
            document.getElementById('total-prize-pool').innerText = `Main Pool: $${(parseInt(s.pool)||0).toLocaleString()}`;
            
            let players = [];
            snapshot.forEach(d => players.push(d.data()));
            renderBoard(players, parseInt(s.par), parseInt(s.pool));
        });

        function renderBoard(playersData, par, pool) {
            let ps = playersData.map(p => {
                const rs = [p.r1, p.r2, p.r3, p.r4].map(v => parseInt(v)||0);
                const act = rs.filter(r => r > 0).length;
                const gross = rs.reduce((a,b)=>a+b, 0);
                const net = act > 0 ? gross - (p.hcap||0) : 0;
                const tp = act > 0 ? net - (par * act) : 999;
                return { ...p, gross, net, tp, act };
            }).sort((a,b) => a.tp - b.tp);

            let i=0, rank=1, html="";
            while(i < ps.length){
                if(ps[i].act === 0){ i++; continue; }
                let ties=0; while(i+ties < ps.length && ps[i+ties].tp === ps[i].tp) ties++;
                let sPts=0, sMoney=0;
                for(let p=rank; p<rank+ties; p++) {
                    if(p<=20) {
                        sPts += ptsTable[p-1];
                        sMoney += (payoutTable[p-1] * pool);
                    }
                }
                const avgPts = Math.round(sPts/ties);
                const avgMoney = Math.round(sMoney/ties);

                for(let j=0; j<ties; j++){
                    const p = ps[i+j];
                    const bonus = ((p.fir||0) + (p.gir||0) + (p.scram||0) + (p.ntp||0)) * 10000;
                    const totalWeekMoney = avgMoney + bonus;
                    const tScore = p.tp === 0 ? 'E' : (p.tp > 0 ? '+'+p.tp : p.tp);
                    
                    html += `<tr>
                        <td style="font-weight:bold">${ties>1?'T'+rank:rank}</td>
                        <td class="player-cell">${p.name}</td>
                        <td>${p.hcap}</td>
                        <td>${p.r1||'-'}</td><td>${p.r2||'-'}</td><td>${p.r3||'-'}</td><td>${p.r4||'-'}</td>
                        <td>${p.gross}</td><td class="net-cell">${p.net}</td>
                        <td style="font-weight:bold">${tScore}</td>
                        <td class="bonus-text">${p.fir?'$10k':'--'}</td>
                        <td class="bonus-text">${p.gir?'$10k':'--'}</td>
                        <td class="bonus-text">${p.scram?'$10k':'--'}</td>
                        <td class="bonus-text">${p.ntp ? '$'+(p.ntp*10000/1000)+'k' : '--'}</td>
                        <td style="font-weight:bold; color:var(--emerald)">${avgPts}</td>
                        <td style="font-weight:bold; color:var(--emerald)">$${totalWeekMoney.toLocaleString()}</td>
                    </tr>`;
                    p.tempPts = avgPts; p.tempMoney = totalWeekMoney;
                }
                i+=ties; rank+=ties;
            }
            document.getElementById('leaderboard-body').innerHTML = html;
            window.currentCalculatedPlayers = ps; 
        }

        // Archive
        document.getElementById('archiveEventBtn').onclick = async () => {
            if(!confirm("Archive this event and update Career Totals?")) return;
            const sSnap = await getDoc(settingsDoc);
            const s = sSnap.data();
            const players = window.currentCalculatedPlayers || [];
            let archivedDetails = [];

            for(const p of players) {
                if(p.act === 0) continue;
                await setDoc(doc(db, "season_stats", p.id), {
                    name: p.name, pts: increment(p.tempPts), earnings: increment(p.tempMoney), events: increment(1)
                }, { merge: true });
                archivedDetails.push({name:p.name, gross:p.gross, net:p.net, tp:p.tp, pts:p.tempPts, prize:p.tempMoney});
            }
            await addDoc(collection(db, "event_history"), { venue:s.venue, date:s.date, details:archivedDetails, timestamp:new Date() });
            alert("Season Stats Updated!");
        };

        // Wipe
        document.getElementById('clearBoardBtn').onclick = async () => {
            if(confirm("Wipe the Live Board for next week?")){
                const snap = await getDocs(scoresCol);
                snap.forEach(async d => await deleteDoc(doc(db, "live_tournament", d.id)));
            }
        };

        // Season Stats Sync
        onSnapshot(query(collection(db, "season_stats"), orderBy("pts", "desc")), (snap) => {
            let html = "", r=1;
            snap.forEach(d => {
                const p = d.data();
                html += `<tr><td>${r++}</td><td class="player-cell">${p.name}</td><td>${p.events}</td><td style="font-weight:bold; color:var(--emerald)">${p.pts}</td><td style="text-align:right; font-weight:bold">$${(p.earnings||0).toLocaleString()}</td></tr>`;
            });
            document.getElementById('season-body').innerHTML = html;
        });

        // History Sync
        onSnapshot(query(collection(db, "event_history"), orderBy("timestamp", "desc")), (snap) => {
            let html = "";
            snap.forEach(d => {
                const h = d.data();
                const rows = (h.details||[]).map((r,idx) => `<tr><td>${idx+1}</td><td style="text-align:left">${r.name}</td><td>${r.gross}</td><td>${r.net}</td><td>${r.tp}</td><td>${r.pts}</td><td style="color:var(--emerald); font-weight:bold">$${r.prize.toLocaleString()}</td></tr>`).join('');
                html += `<div class="history-item"><div class="history-header" onclick="this.parentElement.classList.toggle('active')"><span style="flex:1">${h.venue}</span><span>${h.date} ▼</span></div><div class="history-content"><table><thead><tr><th>POS</th><th style="text-align:left">PLAYER</th><th>G</th><th>N</th><th>TP</th><th>PTS</th><th>TOTAL $</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
            });
            document.getElementById('history-container').innerHTML = html;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Member Portal</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
        .leaderboard-container { max-width: 1450px; margin: 0 auto; background-color: white; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        
        /* Header - Logo Centered */
        .header { background: linear-gradient(135deg, #124d12 0%, #228B22 50%, #1a5e1a 100%); padding: 20px; text-align: center; border-bottom: 4px solid #FFD700; }
        .header img { height: 120px; width: auto; }
        
        /* Table Layout */
        .table-responsive { width: 100%; overflow-x: auto; border-bottom: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #e6e6e6; padding: 10px 12px; font-size: 11px; border-bottom: 2px solid #ddd; text-transform: uppercase; color: #444; }
        td { padding: 8px 12px; border-bottom: 1px solid #ddd; font-size: 13px; white-space: nowrap; }
        
        /* Column Controls */
        .col-pos { width: 45px; text-align: center; font-weight: bold; color: #228B22; }
        .col-stat { width: 75px; text-align: center; }
        .col-money { width: 110px; text-align: center; font-weight: bold; }
        .standings-right { text-align: right; padding-right: 25px; }
        
        /* Highlights & Divider */
        .top-tier { background: linear-gradient(to right, #eef7ee, #ffffff) !important; }
        .cutoff-row td { border-bottom: 3px solid #228B22 !important; }

        .section-title { background: #228B22; color: white; padding: 10px 15px; font-size: 16px; font-weight: bold; border-left: 8px solid #FFD700; }
        .hidden { display: none; }
        
        /* Hall of Fame */
        .hof-container { padding: 30px 10px; background: #1a1a1a; color: white; }
        .hof-header { text-align: center; font-size: 22px; color: #FFD700; margin-bottom: 20px; border-bottom: 2px solid #FFD700; padding-bottom: 10px; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <div class="header">	
        <img src="logo.png" alt="Emerald Tour Logo">
    </div>

    <div id="venue-display" class="venue" style="background:#444; color:white; padding:10px; text-align:center; font-weight:bold; font-size: 14px;">Tournament Results</div>

    <div class="table-responsive">
        <table id="leaderboard-table">
            <thead>
                <tr>
                    <th class="col-pos">POS</th>
                    <th style="text-align:left">PLAYER</th>
                    <th style="text-align:center; width:50px;">PAR</th>
                    <th class="col-stat">R1</th>
                    <th class="col-stat">R2</th>
                    <th id="th-r3" class="col-stat hidden">R3</th>
                    <th id="th-r4" class="col-stat hidden">R4</th>
                    <th class="col-stat">TOT</th>
                    <th class="col-money">PRIZE</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div class="section-title">Season Standings</div>

    <div class="table-responsive">
        <table id="standings-table">
            <thead>
                <tr>
                    <th class="col-pos">POS</th>
                    <th style="text-align:left">PLAYER</th>
                    <th class="standings-right">POINTS</th>
                    <th class="standings-right">EARNINGS</th>
                    <th class="standings-right">EVENTS</th>
                    <th class="col-stat">FIR %</th>
                    <th class="col-stat">GIR %</th>
                    <th class="col-stat">SCRAM %</th>
                    <th class="col-stat">NTP (FT)</th>
                </tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>

    <div class="hof-container">
        <div class="hof-header">🏆 Hall of Fame 🏆</div>
        <div id="hof-display" style="display:flex; justify-content:center; gap:20px;"></div>
    </div>
</div>

<script>
    // Logic to handle R3/R4 visibility and Prize alignment
    function renderLeaderboard(data) {
        const body = document.getElementById('leaderboard-body');
        body.innerHTML = '';
        
        data.players.forEach((p, idx) => {
            const tr = document.createElement('tr');
            // Explicitly defining cells ensures Prize stays in the final column
            tr.innerHTML = `
                <td class="col-pos">${idx + 1}</td>
                <td style="font-weight:bold;">${p.name}</td>
                <td style="text-align:center;">E</td>
                <td class="col-stat">${p.r1 || '-'}</td>
                <td class="col-stat">${p.r2 || '-'}</td>
                <td class="col-stat ${data.showR3R4 ? '' : 'hidden'}">${p.r3 || '-'}</td>
                <td class="col-stat ${data.showR3R4 ? '' : 'hidden'}">${p.r4 || '-'}</td>
                <td class="col-stat">${parseInt(p.r1||0) + parseInt(p.r2||0)}</td>
                <td class="col-money">${p.prize || '$0'}</td>
            `;
            body.appendChild(tr);
        });
    }

    function renderStandings(data) {
        const body = document.getElementById('standings-body');
        body.innerHTML = '';
        
        const topCutoff = Math.ceil(data.players.length / 2) - 1;

        data.players.forEach((p, idx) => {
            const tr = document.createElement('tr');
            if (idx <= topCutoff) tr.classList.add('top-tier');
            if (idx === topCutoff) tr.classList.add('cutoff-row');

            tr.innerHTML = `
                <td class="col-pos">${idx + 1}</td>
                <td style="font-weight:bold;">${p.name}</td>
                <td class="standings-right">${(data.seasonPoints && data.seasonPoints[p.name]) || 0}</td>
                <td class="standings-right" style="font-weight:bold;">$${((data.seasonEarnings && data.seasonEarnings[p.name]) || 0).toLocaleString()}</td>
                <td class="standings-right">${(data.seasonEvents && data.seasonEvents[p.name]) || 0}</td>
                <td class="col-stat">${p.fir || '-'}</td>
                <td class="col-stat">${p.gir || '-'}</td>
                <td class="col-stat">${p.scrambling || '-'}</td>
                <td class="col-stat">${p.ntp || '-'}</td>
            `;
            body.appendChild(tr);
        });
    }

    // Initialize with data from file
    const tourData = {
        showR3R4: false,
        players: [], // This would be populated by your JSON import logic
        seasonEarnings: {},
        seasonPoints: {},
        seasonEvents: {}
    };

    // Note: Use your existing import/load logic to populate tourData
</script>
</body>
</html>

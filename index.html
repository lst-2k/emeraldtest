<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emerald Tour - Member Portal</title>
    <link rel="stylesheet" href="https://cdn.|gh/lipis/flag-icons@7.0.2/css/flag-icons.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root { --emerald: #124d12; --gold: #FFD700; --dark: #1a1a1a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; color: #333; }
        
        /* Layout Containers */
        .leaderboard-container { max-width: 1450px; margin: 0 auto; background-color: white; border: 1px solid #ddd; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        
        /* Header & Venue */
        .header { background: var(--emerald); height: 220px; display: flex; align-items: center; justify-content: center; border-bottom: 4px solid var(--gold); overflow: hidden; }
        .header img { width: 100%; height: 100%; object-fit: contain; }
        .venue-bar { background: #333; color: white; padding: 12px; text-align: center; font-weight: bold; font-size: 16px; letter-spacing: 1px; }

        /* Tables Styling */
        .table-responsive { width: 100%; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th { background-color: #f8f8f8; padding: 12px; font-size: 11px; border-bottom: 2px solid #eee; text-transform: uppercase; color: #666; text-align: center; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; font-size: 14px; white-space: nowrap; text-align: center; }
        
        .player-cell { text-align: left; font-weight: bold; min-width: 200px; }
        .section-title { background: var(--emerald); color: white; padding: 12px 20px; font-size: 18px; font-weight: bold; border-left: 10px solid var(--gold); }

        /* To Par Column Colors */
        .to-par { font-weight: 800; font-size: 15px; width: 80px; }
        .under { color: #d32f2f; } /* Red */
        .even { color: #2e7d32; }  /* Green */
        .over { color: #000000; }  /* Black */

        /* Column Widths */
        .col-pos { width: 50px; color: var(--emerald); font-weight: 900; }
        .col-stat { width: 70px; }
        .col-money { width: 110px; font-weight: bold; color: #2c3e50; }
        .col-bonus { width: 75px; background-color: #fafafa; color: #777; font-size: 12px; border-left: 1px solid #f0f0f0; }

        /* Middle Logo 3D */
        .middle-logo-divider { text-align: center; padding: 40px 20px; background: #fff; display: flex; justify-content: center; }
        .middle-logo-divider img { max-width: 90%; max-height: 140px; height: auto; object-fit: contain; filter: drop-shadow(0 10px 10px rgba(0,0,0,0.1)); }

        /* Season Cutoff Line */
        .top-tier { background: linear-gradient(to right, #f2f9f2, #ffffff) !important; }
        .cutoff-row td { border-bottom: 4px solid var(--emerald) !important; }

        /* 3D HOF Cards (Mobile Optimized) */
        .hof-container { padding: 40px 10px; background: var(--dark); color: white; text-align: center; }
        .hof-header { font-size: 24px; color: var(--gold); margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px; }
        .hof-cards { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; perspective: 1000px; }
        .hof-card { 
            background: linear-gradient(135deg, #2a2a2a 0%, #111 100%); 
            border: 1px solid rgba(255, 215, 0, 0.3); 
            border-radius: 12px; padding: 25px 15px; width: 180px; 
            transform: rotateX(10deg) rotateY(-5deg);
            box-shadow: 8px 10px 20px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .hof-card:nth-child(1) { border: 2px solid var(--gold); transform: rotateX(10deg) rotateY(-5deg) scale(1.08); z-index: 5; }
        .hof-medal { font-size: 40px; margin-bottom: 10px; display: block; }
        
        .hidden { display: none; }
        .standings-right { text-align: right; padding-right: 30px; }
    </style>
</head>
<body>

<div class="leaderboard-container">
    <div class="header"><img src="logo.png" alt="Emerald Tour Logo"></div>

    <div id="venue-display" class="venue-bar">Tuning Broadcast...</div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="col-pos">POS</th>
                    <th style="text-align:left">PLAYER</th>
                    <th class="col-stat">TO PAR</th>
                    <th class="col-stat">R1</th>
                    <th class="col-stat">R2</th>
                    <th id="th-r3" class="col-stat hidden">R3</th>
                    <th id="th-r4" class="col-stat hidden">R4</th>
                    <th class="col-stat">TOT</th>
                    <th class="col-money">PRIZE</th>
                    <th class="col-bonus">FiR%</th>
                    <th class="col-bonus">GiR%</th>
                    <th class="col-bonus">SCRAM</th>
                    <th class="col-bonus">NTP</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body"></tbody>
        </table>
    </div>

    <div class="middle-logo-divider">
        <img src="2k25 logo.png" alt="Season 2025">
    </div>

    <div class="section-title">Season Standings</div>
    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="col-pos">POS</th>
                    <th style="text-align:left">PLAYER</th>
                    <th class="standings-right">POINTS</th>
                    <th class="standings-right">EARNINGS</th>
                    <th class="standings-right">EVENTS</th>
                </tr>
            </thead>
            <tbody id="standings-body"></tbody>
        </table>
    </div>

    <div class="hof-container">
        <div class="hof-header">🏆 Season Leaders 🏆</div>
        <div id="hof-display" class="hof-cards"></div>
    </div>
</div>

<script>
    const DATA_URL = 'data.json';

    async function fetchData() {
        try {
            const response = await fetch(DATA_URL);
            const data = await response.json();
            renderAll(data);
        } catch (e) {
            console.error("Data fetch failed", e);
            document.getElementById('venue-display').innerText = "OFFLINE - Awaiting Data Sync";
        }
    }

    // Logic for Score Conversions
    function getParStats(p, coursePar) {
        let total = 0, played = 0;
        [p.r1, p.r2, p.r3, p.r4].forEach(r => {
            let val = parseInt(r);
            if (!isNaN(val) && val > 0) { total += val; played++; }
        });
        const diff = played > 0 ? total - (coursePar * played) : null;
        return {
            diff: diff,
            total: total,
            display: diff === null ? '-' : (diff === 0 ? 'E' : (diff > 0 ? '+' + diff : diff)),
            cls: diff === null ? '' : (diff < 0 ? 'under' : (diff === 0 ? 'even' : 'over'))
        };
    }

    function renderAll(data) {
        document.getElementById('venue-display').innerText = data.venue || "Weekly Pro-Am";
        const cPar = parseInt(data.coursePar) || 72;

        // Auto-Detect Rounds
        const hasR3 = data.players.some(p => p.r3 > 0);
        const hasR4 = data.players.some(p => p.r4 > 0);
        const showR3R4 = data.showR3R4 || hasR3 || hasR4;

        if(showR3R4) {
            document.getElementById('th-r3').classList.remove('hidden');
            document.getElementById('th-r4').classList.remove('hidden');
        }

        // 1. Render Tournament Table
        const lbBody = document.getElementById('leaderboard-body');
        lbBody.innerHTML = '';
        const sortedLB = [...data.players].sort((a,b) => {
            const tA = [a.r1, a.r2, a.r3, a.r4].reduce((acc, v) => acc + (parseInt(v)||0), 0);
            const tB = [b.r1, b.r2, b.r3, b.r4].reduce((acc, v) => acc + (parseInt(v)||0), 0);
            return tA - tB;
        });

        sortedLB.forEach((p, i) => {
            const stats = getParStats(p, cPar);
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="col-pos">${i+1}</td>
                <td class="player-cell">
                    <i class="fa-brands ${p.console || 'fa-gamepad'}" style="margin-right:8px; opacity:0.6"></i>
                    ${p.name}
                </td>
                <td class="to-par ${stats.cls}">${stats.display}</td>
                <td class="col-stat">${p.r1 || '-'}</td>
                <td class="col-stat">${p.r2 || '-'}</td>
                <td class="col-stat ${showR3R4 ? '' : 'hidden'}">${p.r3 || '-'}</td>
                <td class="col-stat ${showR3R4 ? '' : 'hidden'}">${p.r4 || '-'}</td>
                <td class="col-stat"><strong>${stats.total || '-'}</strong></td>
                <td class="col-money">${p.prize || '$0'}</td>
                <td class="col-bonus">${p.fir || '-'}</td>
                <td class="col-bonus">${p.gir || '-'}</td>
                <td class="col-bonus">${p.scrambling || '-'}</td>
                <td class="col-bonus">${p.ntp || '-'}</td>
            `;
            lbBody.appendChild(tr);
        });

        // 2. Render Season Standings
        const stBody = document.getElementById('standings-body');
        stBody.innerHTML = '';
        const standings = Object.keys(data.seasonPoints || {}).map(name => ({
            name,
            pts: data.seasonPoints[name] || 0,
            earn: data.seasonEarnings[name] || 0,
            evs: data.seasonEvents[name] || 0
        })).sort((a,b) => b.pts - a.pts);

        const mid = Math.ceil(standings.length / 2) - 1;
        standings.forEach((s, i) => {
            const tr = document.createElement('tr');
            if(i <= mid) tr.classList.add('top-tier');
            if(i === mid) tr.classList.add('cutoff-row');
            tr.innerHTML = `
                <td class="col-pos">${i+1}</td>
                <td class="player-cell">${s.name}</td>
                <td class="standings-right">${s.pts.toLocaleString()}</td>
                <td class="standings-right"><strong>$${s.earn.toLocaleString()}</strong></td>
                <td class="standings-right">${s.evs}</td>
            `;
            stBody.appendChild(tr);
        });

        // 3. Render 3D Hall of Fame
        const hof = document.getElementById('hof-display');
        hof.innerHTML = '';
        const top3 = [...standings].sort((a,b) => b.earn - a.earn).slice(0,3);
        const medals = ['🥇','🥈','🥉'];
        top3.forEach((p, i) => {
            const card = document.createElement('div');
            card.className = 'hof-card';
            card.innerHTML = `
                <span class="hof-medal">${medals[i]}</span>
                <div style="font-weight:bold; font-size:16px;">${p.name}</div>
                <div style="color:var(--gold); margin-top:8px; font-weight:bold;">$${p.earn.toLocaleString()}</div>
                <div style="font-size:10px; color:#888; margin-top:4px;">CAREER EARNINGS</div>
            `;
            hof.appendChild(card);
        });
    }

    // This part stays here but is called by your Admin Button
    function finalizeWeekManual() {
        // (Copy function from previous message here if using this as your admin tool)
    }

    window.onload = fetchData;
</script>
</body>
</html>
